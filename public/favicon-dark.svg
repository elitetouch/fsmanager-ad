<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dark-mode favicon — Farm Support Innovation.
  Transparent background so it inherits the browser-chrome colour;
  vivid-green cloud + signal arcs for visibility on dark surfaces.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="FSI">
  <!-- cloud -->
  <path
    d="M 11 9 C 8 9 6 11 6 14 C 4 14.6 3 16 3 17.6 C 3 19.6 4.6 21 7 21 L 18 21 C 20.6 21 22.6 19 22.6 16.4 C 22.6 14 21 12 18.4 11.6 C 17.6 10 16 9 14 9 C 13 9 12 9.4 11.4 10 C 11 9.4 11 9 11 9 Z"
    fill="#16b12d"/>
  <!-- signal arcs -->
  <g fill="none" stroke="#16b12d" stroke-width="1.6" stroke-linecap="round">
    <path d="M 21 9.5 C 25 11 26.4 13.6 26.4 16.6"/>
    <path d="M 21 11.4 C 23.6 12.4 24.6 14.4 24.6 16.6"/>
  </g>
  <circle cx="20.4" cy="15.2" r="2" fill="#16b12d"/>
</svg>
