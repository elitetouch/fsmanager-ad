<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farm Support Innovation — all-white logo mark.

  Same anatomy as logo.svg (cloud + animals + signal arc) but rendered in
  pure white on a transparent background. Use this anywhere the colored
  mark would disappear: the login-page hero gradient, dark navigation
  surfaces, photographic overlays, social-share cards.

  The cloud is a single solid white shape (no inner two-tone — that
  effect doesn't survive on a dark background); the signal arcs and farm
  animal silhouettes are stroked / filled in white with subtle alpha so
  the mark stays legible at small sizes without becoming a flat blob.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-label="Farm Support Innovation"
>
  <!-- ============ CLOUD (solid white) ============ -->
  <path
    d="
      M 90 60
      C 70 60 56 76 56 94
      C 44 100 38 110 38 124
      C 38 138 50 152 70 152
      L 100 152
      L 100 174
      L 122 162
      L 166 162
      C 188 162 204 146 204 124
      C 204 118 203 112 201 108
      C 198 90 184 78 168 76
      C 162 64 148 54 132 54
      C 122 54 112 58 106 64
      C 102 60 96 60 90 60
      Z
    "
    fill="#ffffff"
  />

  <!-- ============ SIGNAL ARCS (white, outside the cloud) ============ -->
  <g fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round">
    <path d="M 196 64 C 218 78 230 102 230 130" />
    <path d="M 196 80 C 212 92 220 110 220 130" />
  </g>
  <circle cx="196" cy="118" r="13" fill="#ffffff" />

  <!-- ============ ANIMAL SILHOUETTES (knocked-out / semi-transparent) ============ -->
  <!--
    Inside the white cloud, the animals can't be white-on-white. We knock
    them out with a low-opacity dark forest tint so they read as silhouettes
    while still keeping the overall mark "white" against a dark background.
  -->
  <g fill="#082710" fill-opacity="0.55">
    <!-- ground line -->
    <path d="M 56 134 L 168 134" stroke="#082710" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Goat -->
    <path d="M 60 124 Q 64 110 76 110 L 90 110 Q 96 110 96 116 L 96 130 L 86 130 L 86 122 L 78 122 L 78 130 L 68 130 L 68 122 Q 62 124 60 124 Z" />
    <path d="M 64 108 Q 60 102 64 100 Q 70 100 72 106 Z" />
    <path d="M 65 100 Q 62 94 66 92" stroke="#082710" stroke-opacity="0.55" stroke-width="2" fill="none" />

    <!-- Plant -->
    <rect x="110" y="118" width="3" height="16" rx="1.5" />
    <path d="M 111 118 Q 100 112 100 100 Q 108 102 113 110 Z" />
    <path d="M 113 118 Q 124 112 124 100 Q 116 102 111 110 Z" />
    <path d="M 112 104 Q 108 92 112 84 Q 116 92 112 104 Z" />

    <!-- Chicken / rooster -->
    <path d="M 130 130 Q 130 116 144 114 Q 158 114 160 124 L 160 130 L 154 130 L 154 124 L 146 124 L 146 130 Z" />
    <path d="M 144 114 Q 142 108 148 106 Q 154 108 154 112 Z" />
    <path d="M 148 106 Q 146 100 150 102 Q 152 98 154 102 Q 156 100 156 104 Z" />
    <path d="M 154 110 L 160 112 L 154 114 Z" />
    <path d="M 130 124 Q 122 116 124 108 Q 132 112 134 122 Z" />
  </g>
</svg>
